<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="glowA" cx="15%" cy="0%" r="60%">
      <stop offset="0" stop-color="#f5a524" stop-opacity="0.20"/><stop offset="1" stop-color="#f5a524" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="92%" cy="8%" r="55%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.20"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#0c1220"/>
      <stop offset="1" stop-color="#fb923c" stop-opacity="0.9"/>
    </linearGradient>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#94a9cd" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <clipPath id="tile"><rect x="772" y="155" width="320" height="320" rx="22"/></clipPath>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#05080f"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- brand row -->
  <g transform="translate(80,74)">
    <g transform="translate(0,-6)">
      <circle cx="8" cy="11" r="3.4" fill="#38bdf8"/><circle cx="8" cy="29" r="3.4" fill="#38bdf8"/>
      <circle cx="20" cy="20" r="3.8" fill="url(#amber)"/>
      <circle cx="32" cy="14" r="3.4" fill="#e2e8f0"/><circle cx="32" cy="27" r="3.4" fill="#e2e8f0"/>
      <g stroke="url(#amber)" stroke-width="1.6" opacity="0.85">
        <line x1="8" y1="11" x2="20" y2="20"/><line x1="8" y1="29" x2="20" y2="20"/>
        <line x1="20" y1="20" x2="32" y2="14"/><line x1="20" y1="20" x2="32" y2="27"/>
      </g>
    </g>
    <text x="52" y="26" font-size="26" font-weight="800" letter-spacing="-0.5" fill="#eaf0fa">Neuro<tspan fill="#f5a524">Forge</tspan></text>
  </g>

  <!-- headline -->
  <text x="80" y="250" font-size="72" font-weight="800" letter-spacing="-2" fill="#eaf0fa">Watch a neural</text>
  <text x="80" y="328" font-size="72" font-weight="800" letter-spacing="-2" fill="#eaf0fa">network <tspan fill="#f5a524">learn.</tspan></text>

  <!-- subline -->
  <text x="82" y="392" font-size="25" fill="#93a1b8">Forward pass, backprop &amp; optimizers — hand-written</text>
  <text x="82" y="426" font-size="25" fill="#93a1b8">in vanilla JavaScript. No TensorFlow. No build step.</text>

  <!-- pills -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="17" font-weight="600">
    <g transform="translate(82,470)">
      <rect x="0" y="0" width="150" height="38" rx="19" fill="#f5a52424" stroke="#f5a52440"/>
      <text x="75" y="25" text-anchor="middle" fill="#f5a524">0 ML deps</text>
    </g>
    <g transform="translate(244,470)">
      <rect x="0" y="0" width="148" height="38" rx="19" fill="#ffffff08" stroke="#94a9cd33"/>
      <text x="74" y="25" text-anchor="middle" fill="#93a1b8">no build step</text>
    </g>
    <g transform="translate(404,470)">
      <rect x="0" y="0" width="150" height="38" rx="19" fill="#ffffff08" stroke="#94a9cd33"/>
      <text x="75" y="25" text-anchor="middle" fill="#93a1b8">view source</text>
    </g>
  </g>

  <!-- url -->
  <text x="82" y="566" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="20" fill="#5b6678">neuroforge-charan.vercel.app</text>

  <!-- decision-boundary tile -->
  <g>
    <rect x="772" y="155" width="320" height="320" rx="22" fill="url(#field)" opacity="0.92"/>
    <g clip-path="url(#tile)">
      <!-- spiral of points -->
      <g>
        <circle cx="932" cy="315" r="6" fill="#fb923c"/>
        <circle cx="985" cy="300" r="6" fill="#fb923c"/>
        <circle cx="1018" cy="262" r="6" fill="#fb923c"/>
        <circle cx="1020" cy="214" r="6" fill="#fb923c"/>
        <circle cx="988" cy="182" r="6" fill="#fb923c"/>
        <circle cx="940" cy="178" r="6" fill="#fb923c"/>
        <circle cx="900" cy="200" r="6" fill="#fb923c"/>
        <circle cx="882" cy="245" r="6" fill="#fb923c"/>
        <circle cx="932" cy="315" r="6" fill="#fb923c" opacity="0"/>
        <circle cx="932" cy="315" r="6" fill="#38bdf8" opacity="0"/>
        <circle cx="878" cy="328" r="6" fill="#38bdf8"/>
        <circle cx="845" cy="368" r="6" fill="#38bdf8"/>
        <circle cx="844" cy="416" r="6" fill="#38bdf8"/>
        <circle cx="876" cy="448" r="6" fill="#38bdf8"/>
        <circle cx="924" cy="452" r="6" fill="#38bdf8"/>
        <circle cx="964" cy="430" r="6" fill="#38bdf8"/>
        <circle cx="982" cy="385" r="6" fill="#38bdf8"/>
        <circle cx="936" cy="360" r="6" fill="#38bdf8"/>
      </g>
    </g>
    <rect x="772" y="155" width="320" height="320" rx="22" fill="none" stroke="#94a9cd33" stroke-width="1.5"/>
    <text x="932" y="503" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="15" fill="#5b6678">live decision boundary</text>
  </g>
</svg>
